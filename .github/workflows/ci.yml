name: CI

on:
  workflow_call:

env:
  # golangci-lint must be built with the same Go major as the module targets,
  # otherwise it refuses to lint. Pinning the version keeps CI reproducible.
  GOLANGCI_LINT_VERSION: v2.12.2

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Use the Go toolchain installed by setup-go instead of downloading
      # another one; this also ensures a complete SDK (covdata, race, ...).
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-go@v6
        with:
          go-version-file: back/go.mod

      - name: Install frontend dependencies
        run: cd front && bun install --frozen-lockfile

      - name: Install golangci-lint
        run: |
          go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Check formatting
        run: make format-check

      - name: Run linters
        run: make lint

      - name: Run tests
        run: make test

      - name: Build
        run: make build
