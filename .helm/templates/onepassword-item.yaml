{{- if .Values.onePassword.enabled -}}
{{- $root := . -}}
{{- range $item := .Values.onePassword.items -}}
{{- $vault := default $root.Values.onePassword.defaultVault $item.vault -}}
{{- if not $vault -}}
{{- fail (printf "onePassword.items[%s]: vault is required (set item.vault or onePassword.defaultVault)" $item.name) -}}
{{- end -}}
{{- if not $item.item -}}
{{- fail (printf "onePassword.items[%s]: item (1Password item name) is required" $item.name) -}}
{{- end }}
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ include "app.onePasswordItemName" (dict "root" $root "item" $item) }}
  labels:
    {{- include "app.labels" $root | nindent 4 }}
  {{- $annotations := $item.annotations | default dict }}
  {{- if $root.Values.onePassword.autoRestart }}
  {{- $annotations = merge (dict "operator.1password.io/auto-restart" "true") $annotations }}
  {{- end }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  itemPath: {{ printf "vaults/%s/items/%s" $vault $item.item | quote }}
{{- end }}
{{- end }}
