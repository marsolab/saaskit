{{- if .Values.tailscaleIngress.enabled -}}
{{- if not .Values.tailscaleIngress.host -}}
{{- fail "tailscaleIngress.enabled requires tailscaleIngress.host" -}}
{{- end -}}
{{- if not .Values.service.enabled -}}
{{- fail "tailscaleIngress.enabled requires service.enabled" -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "app.fullname" . }}-tailscale
  labels:
    {{- include "app.labels" . | nindent 4 }}
  {{- with .Values.tailscaleIngress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.tailscaleIngress.className | quote }}
  {{- if .Values.tailscaleIngress.tls }}
  tls:
    - hosts:
        - {{ .Values.tailscaleIngress.host | quote }}
  {{- end }}
  defaultBackend:
    service:
      name: {{ include "app.fullname" . }}
      port:
        number: {{ .Values.service.port }}
  rules:
    - host: {{ .Values.tailscaleIngress.host | quote }}
      http:
        paths:
          - path: {{ .Values.tailscaleIngress.path }}
            pathType: {{ .Values.tailscaleIngress.pathType }}
            backend:
              service:
                name: {{ include "app.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
